<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字を探せ</title>
    <style>
body { 
        /* 明朝体を優先する設定 */
        font-family: "Sawarabi Mincho", "Hiragino Mincho ProN", "MS Mincho", "serif"; 
        background: #fff; 
        margin: 0; 
        padding: 20px; 
    }
        #print-area {
            position: relative;
            width: 800px; 
            height: 1000px;
            border: 2px solid #000;
            overflow: hidden;
            background-color: white;
            margin-bottom: 20px;
        }
        .kanji {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
            user-select: none;
            font-weight: bold;
        }
        .controls { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .reference { font-size: 12px; color: #555; }
        @media print {
            .controls { display: none; }
            #print-area { border: none; }
        }
    </style>
</head>
<body>

<div class="controls">
    <h2>漢字を探せ</h2>
    <p>
        文字：<input type="text" id="dummies" value="悪 安 暗 医 委 意 育 員 院 飲 運 泳 駅 央 横 屋 温 化 荷 界 開 階 寒 感 漢 館 岸 起 期 客 究 急 級 宮 球 去 橋 業 曲 局 銀 区 苦 具 君 係 軽 血 決 研 県 庫 湖 向 幸 港 号 根 祭 皿 仕 死 使 始 指 歯 詩 次 事 持 式 実 写 者 主 守 取 酒 受 州 拾 終 習 集 住 重 宿 所 暑 助 昭 消 商 章 勝 乗 植 申 身 神 真 深 進 世 整 昔 全 相 送 想 息 速 族 他 打 対 待 代 第 題 炭 短 談 着 注 柱 丁 帳 調 追 定 庭 笛 鉄 転 都 度 投 豆 島 湯 登 等 動 童 農 波 配 倍 箱 畑 発 反 坂 板 皮 悲 美 鼻 筆 氷 表 秒 病 品 負 部 服 福 物 平 返 勉 放 味 命 面 問 役 薬 由 油 有 遊 予 羊 洋 葉 陽 様 落 流 旅 両 緑 礼 列 練 路 和" style="width:200px;">
    </p>
    <p>
        列数(横)：<input type="number" id="cols" value="15" style="width:50px;">
        行数(縦)：<input type="number" id="rows" value="20" style="width:50px;">
        ※「個数」は（列 × 行）になります。
    </p>
    <button onclick="generate()">プリントを生成</button>
    <button onclick="window.print()">印刷する</button>
</div>

<div id="print-area"></div>

<div class="reference">
    参考：<a href="https://ja.wikipedia.org/wiki/%E5%AD%A6%E5%B9%B4%E5%88%A5%E6%BC%A2%E5%AD%97%E9%85%8D%E5%BD%93%E8%A1%A8" target="_blank">学年別漢字配当表 - Wikipedia</a>
</div>

<script>
function generate() {
    const area = document.getElementById('print-area');
    
    // 空白を取り除くロジックを追加（正規表現 /\s+/g で全角・半角・タブ等を除去）
    const dummyCharsRaw = document.getElementById('dummies').value.replace(/\s+/g, '');
        
    const dummyChars = dummyCharsRaw.split('');
    
    // ダミーが空っぽになった場合の対策
    if (dummyChars.length === 0) {
        alert("ハズレ文字を入力してください。");
        return;
    }

    const rows = parseInt(document.getElementById('rows').value);
    const cols = parseInt(document.getElementById('cols').value);
    
    area.innerHTML = ''; 

    const areaWidth = area.clientWidth;
    const areaHeight = area.clientHeight;
    const cellWidth = areaWidth / cols;
    const cellHeight = areaHeight / rows;

    const targetIndex = Math.floor(Math.random() * (rows * cols));

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const currentIndex = r * cols + c;
            const span = document.createElement('span');
            span.className = 'kanji';
            
            {
                span.innerText = dummyChars[Math.floor(Math.random() * dummyChars.length)];
            }

            // セル内でのランダムな位置（Stratified Sampling）
            const offsetX = (Math.random() - 0.5) * (cellWidth * 0.4);
            const offsetY = (Math.random() - 0.5) * (cellHeight * 0.4);
            
            const posX = (c * cellWidth) + (cellWidth / 2) + offsetX;
            const posY = (r * cellHeight) + (cellHeight / 2) + offsetY;

            const fontSize = Math.min(cellWidth, cellHeight) * 0.75;
            const rotate = Math.floor(Math.random() * 180) - 90;

            span.style.width = cellWidth + 'px';
            span.style.height = cellHeight + 'px';
            span.style.fontSize = fontSize + 'px';
            span.style.left = (posX - cellWidth/2) + 'px';
            span.style.top = (posY - cellHeight/2) + 'px';
            span.style.transform = `rotate(${rotate}deg)`;

            area.appendChild(span);
        }
    }
}

// 初回実行
generate();
</script>

</body>
</html>
